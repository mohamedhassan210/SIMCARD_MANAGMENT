<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="css/main.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">

<body class="bg-black text-white min-vh-100 font-sans">

    <div class="container-fluid py-5 px-md-5">

        <div class="d-flex justify-content-center my-5">
            <div class="overlap-title-wrapper">
                <div class="overlap-number">120</div>
                <div class="overlap-text">Employee</div>
            </div>
        </div>
        <div class="d-flex align-items-center gap-3 mb-4">

                <input type="text" class="form-control bg-transparent border-0 text-white shadow-none "

            </div>

            <button class="btn custom-filter-btn"
                style="box-shadow: 0px 0px 10px 5px rgba(255, 255, 255, 0.2) !important; border: none !important;">
                <i class="bi bi-filter-right text-white fs-4"></i>
            </button>
        </div>

                    <thead>

                    <tbody>

                            <td class="border-end">012</td>
                            <td class="border-end">01556176733</td>
                            <td class="border-end py-3">
                                <span class="badge bg-brand-orange rounded-pill me-1 px-3 py-2">1 SIM</span>
                                <span class="badge bg-brand-orange rounded-pill px-3 py-2">2 USB</span>
                            </td>
                            <td class="text-center">
                                <button class="btn btn-sm btn-brand-orange text-white rounded-2"><i
                                        class="bi bi-box-arrow-up-right"></i></button>
                            </td>
                        </tr>
                        <tr>
                            <td class="text-muted border-end">1</td>

                            <td class="border-end">01556176733</td>
                            <td class="border-end py-3">
                                <span class="badge bg-brand-orange rounded-pill px-3 py-2">2 USB</span>

                            <td class="text-center">

                                        class="bi bi-box-arrow-up-right"></i></button>

                        </tr>
                        <tr>
                            <td class="text-muted border-end">2</td>
                            <td class="border-end">Adham Amr Mohamed</td>
                            <td class="border-end">012</td>
                            <td class="border-end">01556176733</td>
